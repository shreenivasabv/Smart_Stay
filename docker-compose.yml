version: '3.8'

services:

  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: shreenivasa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    networks:
      - smartstay-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - smartstay-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - smartstay-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8762:8762"
    networks:
      - smartstay-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8762/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8083:8083"
    depends_on:
      eureka-server:
        condition: service_healthy
    environment:
      - eureka.client.service-url.defaultZone=http://eureka-server:8762/eureka/
    networks:
      - smartstay-network
    restart: on-failure

  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - spring.datasource.url=jdbc:postgresql://postgres:5432/user_db
      - spring.datasource.driver-class-name=org.postgresql.Driver
      - spring.datasource.username=postgres
      - spring.datasource.password=shreenivasa
      - spring.jpa.hibernate.ddl-auto=update
      - eureka.client.service-url.defaultZone=http://eureka-server:8762/eureka/
      - jwt.secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
      - jwt.expiration=86400000
      - spring.data.redis.host=redis
      - spring.data.redis.port=6379
    networks:
      - smartstay-network
    restart: on-failure

  property-service:
    build: ./property-service
    container_name: property-service
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - spring.datasource.url=jdbc:postgresql://postgres:5432/property_db
      - spring.datasource.driver-class-name=org.postgresql.Driver
      - spring.datasource.username=postgres
      - spring.datasource.password=shreenivasa
      - spring.jpa.hibernate.ddl-auto=update
      - eureka.client.service-url.defaultZone=http://eureka-server:8762/eureka/
      - spring.data.redis.host=redis
      - spring.data.redis.port=6379
      - spring.cache.type=redis
    networks:
      - smartstay-network
    restart: on-failure

  booking-service:
    build: ./booking-service
    container_name: booking-service
    ports:
      - "8088:8088"
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - spring.datasource.url=jdbc:postgresql://postgres:5432/booking_db
      - spring.datasource.driver-class-name=org.postgresql.Driver
      - spring.datasource.username=postgres
      - spring.datasource.password=shreenivasa
      - spring.jpa.hibernate.ddl-auto=update
      - eureka.client.service-url.defaultZone=http://eureka-server:8762/eureka/
      - spring.rabbitmq.host=rabbitmq
      - spring.rabbitmq.port=5672
      - spring.rabbitmq.username=guest
      - spring.rabbitmq.password=guest
    networks:
      - smartstay-network
    restart: on-failure

networks:
  smartstay-network:
    driver: bridge

volumes:
  postgres_dat